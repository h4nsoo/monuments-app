<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Questini - Results</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#d5e3ff",
                        "on-surface": "#d6e3ff",
                        "surface-tint": "#adc8f5",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#133a69",
                        "on-primary-fixed": "#001c3b",
                        "inverse-on-surface": "#233148",
                        "secondary-fixed-dim": "#e9c349",
                        "surface-container-highest": "#27354c",
                        "on-secondary-fixed-variant": "#574500",
                        "surface-bright": "#2c3951",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#adc8f5",
                        "error-container": "#93000a",
                        "on-primary": "#133155",
                        "surface-variant": "#27354c",
                        "tertiary": "#a7c8ff",
                        "outline": "#8e9199",
                        "secondary": "#e9c349",
                        "on-secondary-fixed": "#241a00",
                        "inverse-primary": "#455f87",
                        "on-surface-variant": "#c4c6cf",
                        "on-secondary-container": "#342800",
                        "on-tertiary": "#03305f",
                        "surface-container-low": "#0d1c32",
                        "on-tertiary-fixed-variant": "#234777",
                        "surface-container-lowest": "#010e24",
                        "primary-container": "#1e3a5f",
                        "inverse-surface": "#d6e3ff",
                        "tertiary-fixed": "#d5e3ff",
                        "outline-variant": "#43474e",
                        "surface-container-high": "#1c2a41",
                        "tertiary-fixed-dim": "#a7c8ff",
                        "on-tertiary-fixed": "#001b3b",
                        "primary": "#adc8f5",
                        "secondary-container": "#af8d11",
                        "on-secondary": "#3c2f00",
                        "secondary-fixed": "#ffe088",
                        "surface-dim": "#041329",
                        "surface": "#041329",
                        "surface-container": "#112036",
                        "on-primary-fixed-variant": "#2d486d",
                        "on-primary-container": "#8aa4cf",
                        "on-tertiary-container": "#84a5da",
                        "on-background": "#d6e3ff",
                        "error": "#ffb4ab",
                        "background": "#041329"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "gutter": "16px",
                        "sm": "12px",
                        "md": "24px",
                        "xl": "64px",
                        "container-margin": "20px",
                        "lg": "48px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "display-lg": ["Noto Serif"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Noto Serif"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .zellige-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l15 15-15 15-15-15L30 0zm0 60l15-15-15-15-15 15 15 15zM0 30l15 15 15-15-15-15L0 30zm60 0l-15 15-15-15 15-15 15 15z' fill='%23adc8f5' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md flex flex-col zellige-pattern">
<!-- Top Navigation (Component: TopAppBar) -->
<header class="bg-surface/80 dark:bg-inverse-surface/80 backdrop-blur-md fixed top-0 z-50 w-full">
<div class="flex justify-between items-center px-container-margin h-16 w-full max-w-7xl mx-auto">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-tertiary-fixed-dim">Questini</h1>
<div class="w-10"></div> <!-- Spacer to center title since profile was removed -->
</div>
</header>
<main class="flex-grow flex flex-col items-center pt-24 pb-32 px-container-margin max-w-lg mx-auto w-full">
<!-- Results Hero Card -->
<section class="w-full bg-surface-container rounded-xl p-md shadow-lg border border-outline-variant/10 relative overflow-hidden flex flex-col items-center text-center mb-md">
<!-- Decorative Background Icon -->
<div class="absolute -top-4 -right-4 w-20 h-20 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[80px] text-primary" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="mb-md">
<span class="material-symbols-outlined text-secondary text-[64px] mb-2" data-icon="military_tech" style="font-variation-settings: 'FILL' 1;">military_tech</span>
<p class="font-label-sm text-label-sm uppercase tracking-[0.1em] text-on-surface-variant">Quiz Completed</p>
<h2 class="font-headline-md text-headline-md text-primary mt-1">Heritage Expert</h2>
</div>
<div class="flex items-baseline justify-center gap-1 mb-2">
<span class="font-display-lg text-[72px] leading-tight text-primary font-bold">8</span>
<span class="font-headline-md text-on-surface-variant">/ 12</span>
</div>
<div class="inline-flex items-center px-6 py-2 rounded-full bg-tertiary-container text-on-tertiary-container font-label-sm text-label-sm font-bold shadow-md">
                67% SCORE
            </div>
</section>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-gutter w-full mb-md">
<div class="bg-surface-container-low border border-outline-variant/10 p-md rounded-xl flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-primary mb-1" data-icon="check_circle">check_circle</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Correct</span>
<span class="font-headline-md text-primary">8</span>
</div>
<div class="bg-surface-container-low border border-outline-variant/10 p-md rounded-xl flex flex-col items-center justify-center text-center">
<span class="material-symbols-outlined text-error mb-1" data-icon="cancel">cancel</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Incorrect</span>
<span class="font-headline-md text-primary">4</span>
</div>
<div class="bg-surface-container-low border border-outline-variant/10 p-md rounded-xl flex items-center gap-4 col-span-2">
<div class="bg-surface-container-highest p-2 rounded-lg">
<span class="material-symbols-outlined text-tertiary" data-icon="schedule">schedule</span>
</div>
<div class="text-left">
<span class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-wider">Time Taken</span>
<span class="font-headline-md text-primary">04:12 <span class="text-label-sm font-normal text-on-surface-variant">min</span></span>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-sm">
<button class="w-full h-14 bg-primary text-on-primary font-bold text-lg rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg shadow-primary/10">
<span class="material-symbols-outlined" data-icon="replay">replay</span>
                Play Again
            </button>
<button class="w-full h-14 bg-surface-container-high border border-outline-variant/20 text-on-surface font-bold text-lg rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="home">home</span>
                Back to Menu
            </button>
</div>
</main>
<!-- Bottom Navigation (Component: BottomNavBar) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-surface/90 dark:bg-inverse-surface/90 backdrop-blur-md border-t border-outline-variant dark:border-outline shadow-lg rounded-t-xl">
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-variant transition-all rounded-lg cursor-pointer">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-variant transition-all rounded-lg cursor-pointer">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-label-sm text-label-sm">Categories</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-variant transition-all rounded-lg cursor-pointer">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-sm text-label-sm">Rankings</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:bg-surface-container dark:hover:bg-surface-variant transition-all rounded-lg cursor-pointer">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-sm text-label-sm">Settings</span>
</div>
</nav>
</body></html>
